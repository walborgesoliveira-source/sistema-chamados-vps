<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="4; url=https://coreps.iaguru.com.br/historico?origem=chamados">
  <title>Administração migrada para CORE PS</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }
    main {
      width: min(520px, calc(100vw - 32px));
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, .08);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 22px;
      line-height: 1.2;
    }
    p {
      margin: 0 0 18px;
      color: #4b5563;
      line-height: 1.5;
      font-size: 15px;
    }
    a {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Administração migrada para CORE PS</h1>
    <p>Os chamados agora são acompanhados em CORE PS, no módulo Atendimentos. Esta tela antiga não deve mais ser usada.</p>
    <a href="https://coreps.iaguru.com.br/historico?origem=chamados">Abrir CORE PS</a>
  </main>
</body>
</html>
